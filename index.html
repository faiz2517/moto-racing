<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MOTO RUSH – Endless Superbike Racing</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --neon: #00f0ff;
    --neon2: #ff3c00;
    --gold: #ffd700;
    --dark: #050a0f;
    --panel: rgba(0,15,25,0.92);
    --accent: #00f0ff;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    font-family: 'Rajdhani', sans-serif;
    color: #fff;
    touch-action: none;
    user-select: none;
  }

  #gameCanvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    image-rendering: pixelated;
    cursor: none;
  }

  /* ── SCREENS ── */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    transition: opacity .3s;
  }
  .screen.hidden { opacity: 0; pointer-events: none; }

  /* ── MAIN MENU ── */
  #menuScreen {
    background: linear-gradient(180deg, #000 0%, #001a2e 60%, #000 100%);
  }
  .menu-logo {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(36px, 8vw, 80px);
    font-weight: 900;
    letter-spacing: .12em;
    text-transform: uppercase;
    background: linear-gradient(90deg, #00f0ff, #ffffff, #ff3c00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: none;
    filter: drop-shadow(0 0 30px #00f0ff88);
    margin-bottom: 8px;
  }
  .menu-sub {
    font-size: clamp(12px,2.5vw,18px);
    letter-spacing: .35em;
    color: #00f0ff99;
    text-transform: uppercase;
    margin-bottom: 48px;
  }
  .btn {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(13px,2vw,16px);
    font-weight: 700;
    letter-spacing: .15em;
    text-transform: uppercase;
    padding: 14px 48px;
    border: 2px solid var(--neon);
    background: transparent;
    color: var(--neon);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all .2s;
    margin: 6px;
    clip-path: polygon(10px 0%, 100% 0%, calc(100% - 10px) 100%, 0% 100%);
  }
  .btn::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--neon);
    transform: translateX(-101%);
    transition: transform .2s;
    z-index: -1;
  }
  .btn:hover::before { transform: translateX(0); }
  .btn:hover { color: #000; box-shadow: 0 0 30px var(--neon); }
  .btn-red { border-color: var(--neon2); color: var(--neon2); }
  .btn-red::before { background: var(--neon2); }
  .btn-red:hover { color: #fff; box-shadow: 0 0 30px var(--neon2); }
  .btn-gold { border-color: var(--gold); color: var(--gold); }
  .btn-gold::before { background: var(--gold); }
  .btn-gold:hover { color: #000; box-shadow: 0 0 30px var(--gold); }

  .hi-score-display {
    color: #ffd70099;
    font-family: 'Orbitron',sans-serif;
    font-size: clamp(11px,1.8vw,14px);
    letter-spacing: .2em;
    margin-bottom: 32px;
  }
  .hi-score-display span { color: var(--gold); }

  /* ── BIKE SELECTION ── */
  #bikeScreen {
    background: linear-gradient(180deg, #000 0%, #001020 70%, #000 100%);
  }
  .bike-select-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px,4vw,36px);
    font-weight: 900;
    letter-spacing: .2em;
    color: var(--neon);
    margin-bottom: 32px;
    text-transform: uppercase;
  }
  .bike-cards {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 900px;
    margin-bottom: 32px;
  }
  .bike-card {
    width: clamp(200px, 26vw, 260px);
    border: 2px solid #00f0ff33;
    background: rgba(0,20,40,.85);
    padding: 20px;
    cursor: pointer;
    transition: all .2s;
    position: relative;
    clip-path: polygon(12px 0%, 100% 0%, calc(100% - 12px) 100%, 0% 100%);
  }
  .bike-card:hover, .bike-card.selected {
    border-color: var(--neon);
    background: rgba(0,60,90,.85);
    box-shadow: 0 0 20px #00f0ff55;
    transform: translateY(-4px);
  }
  .bike-card.selected::after {
    content: '✓ SELECTED';
    position: absolute; top: 8px; right: 12px;
    font-family: 'Orbitron', sans-serif;
    font-size: 9px; letter-spacing: .15em;
    color: var(--gold);
  }
  .bike-card-name {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(11px,1.5vw,13px);
    font-weight: 700;
    letter-spacing: .1em;
    color: #fff;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .bike-emoji { font-size: 36px; display: block; margin-bottom: 10px; text-align: center; }
  .stat-bar-row { margin-bottom: 8px; }
  .stat-label { font-size: 11px; color: #aaa; letter-spacing: .1em; margin-bottom: 3px; }
  .stat-bar {
    height: 6px;
    background: #0a2030;
    border-radius: 3px;
    overflow: hidden;
  }
  .stat-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #00f0ff, #0080ff);
    transition: width .4s;
  }

  /* ── HUD ── */
  #hud {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 5;
  }
  .hud-top {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 14px 18px;
  }
  .hud-score {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px,4vw,32px);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 20px var(--neon);
  }
  .hud-label {
    font-size: 10px; letter-spacing: .2em; color: #88ccdd; margin-bottom: 2px;
  }
  .hud-dist {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(13px,2vw,18px);
    color: var(--neon);
    text-align: right;
  }
  .hud-bottom {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-end;
    padding: 14px 18px;
  }
  /* Speedometer */
  .speedo-wrap {
    display: flex; flex-direction: column; align-items: center;
  }
  #speedoCanvas { display: block; }
  .speedo-val {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(16px,3vw,22px);
    font-weight: 900;
    color: #fff;
    margin-top: -4px;
    text-align: center;
  }
  .speedo-unit { font-size: 10px; color: #88ccdd; letter-spacing: .15em; }
  /* Nitro bar */
  .nitro-wrap {
    display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
  }
  .nitro-label {
    font-family: 'Orbitron', sans-serif;
    font-size: 10px; letter-spacing: .2em; color: var(--neon2);
  }
  .nitro-bar-bg {
    width: clamp(80px,14vw,130px);
    height: 12px;
    background: #0a1520;
    border: 1px solid #ff3c0066;
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 0 8px #ff3c0044;
  }
  #nitroBar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #ff3c00, #ffaa00);
    border-radius: 6px;
    transition: width .1s;
  }
  .nitro-hint {
    font-size: 9px; color: #ff3c0088; letter-spacing: .1em;
  }
  /* Near-miss flash */
  #nearMissFlash {
    position: absolute; inset: 0; pointer-events: none;
    border: 6px solid #ffd700;
    box-shadow: inset 0 0 60px #ffd70055;
    opacity: 0;
    transition: opacity .1s;
    z-index: 6;
  }
  /* Nitro overlay */
  #nitroOverlay {
    position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, #ff3c0020 100%);
    opacity: 0;
    z-index: 4;
  }

  /* PAUSE */
  #pauseScreen {
    background: rgba(0,5,10,.9);
  }
  .pause-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(28px,5vw,52px);
    font-weight: 900;
    letter-spacing: .3em;
    color: var(--neon);
    margin-bottom: 40px;
    text-transform: uppercase;
  }

  /* GAME OVER */
  #gameOverScreen {
    background: linear-gradient(180deg, rgba(0,0,0,.95) 0%, rgba(10,0,0,.95) 100%);
  }
  .go-title {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(30px,6vw,64px);
    font-weight: 900;
    letter-spacing: .15em;
    color: var(--neon2);
    filter: drop-shadow(0 0 20px var(--neon2));
    margin-bottom: 16px;
    text-transform: uppercase;
    animation: goFlicker 1s ease-in-out infinite;
  }
  @keyframes goFlicker {
    0%,100% { opacity: 1; }
    50% { opacity: .85; }
  }
  .go-stats {
    display: flex; gap: 32px; margin-bottom: 40px; flex-wrap: wrap; justify-content: center;
  }
  .go-stat {
    text-align: center;
    border: 1px solid #ffffff22;
    padding: 14px 24px;
    background: rgba(255,255,255,.04);
  }
  .go-stat-val {
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(20px,3.5vw,32px);
    font-weight: 900;
    color: #fff;
  }
  .go-stat-val.gold { color: var(--gold); filter: drop-shadow(0 0 8px var(--gold)); }
  .go-stat-label { font-size: 11px; letter-spacing: .2em; color: #888; margin-top: 4px; }

  /* Mobile nitro btn */
  #mobileNitroBtn {
    position: absolute; bottom: 20px; right: 20px;
    width: 70px; height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle, #ff6600, #ff3c00);
    border: 3px solid #ffaa00;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    font-family: 'Orbitron', sans-serif;
    font-size: 10px; font-weight: 700; letter-spacing: .1em;
    color: #fff;
    box-shadow: 0 0 20px #ff3c0088;
    z-index: 20;
    cursor: pointer;
    transition: transform .1s;
  }
  #mobileNitroBtn:active { transform: scale(.92); }
  #mobileNitroBtn.hidden { display: none; }

  /* Road scanlines */
  #scanlines {
    position: absolute; inset: 0; pointer-events: none; z-index: 2;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,.06) 3px, rgba(0,0,0,.06) 4px);
  }

  /* Bonus popup */
  .bonus-popup {
    position: absolute;
    font-family: 'Orbitron', sans-serif;
    font-size: clamp(14px,2.5vw,20px);
    font-weight: 700;
    pointer-events: none;
    z-index: 8;
    text-shadow: 0 0 12px currentColor;
    animation: popupAnim .9s ease-out forwards;
  }
  @keyframes popupAnim {
    0%  { opacity: 1; transform: translateY(0) scale(1); }
    70% { opacity: 1; transform: translateY(-40px) scale(1.1); }
    100% { opacity: 0; transform: translateY(-80px) scale(.8); }
  }

  /* Controls help */
  .controls-tip {
    position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
    font-size: clamp(10px,1.8vw,13px);
    color: #ffffff55;
    letter-spacing: .15em;
    text-align: center;
    pointer-events: none;
    z-index: 5;
    white-space: nowrap;
  }

  /* Explosion */
  #explosionCanvas {
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 9;
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>
<canvas id="explosionCanvas"></canvas>
<div id="scanlines"></div>

<!-- HUD -->
<div id="hud" class="hidden">
  <div class="hud-top">
    <div>
      <div class="hud-label">SCORE</div>
      <div class="hud-score" id="hudScore">0</div>
    </div>
    <div style="text-align:right">
      <div class="hud-label">DISTANCE</div>
      <div class="hud-dist" id="hudDist">0 m</div>
    </div>
  </div>
  <div class="hud-bottom">
    <div class="speedo-wrap">
      <canvas id="speedoCanvas" width="90" height="90"></canvas>
      <div class="speedo-val"><span id="speedoVal">0</span></div>
      <div class="speedo-unit">km/h</div>
    </div>
    <div class="nitro-wrap">
      <div class="nitro-label">⚡ NITRO</div>
      <div class="nitro-bar-bg"><div id="nitroBar"></div></div>
      <div class="nitro-hint">SPACE / TAP BOOST</div>
    </div>
  </div>
  <div id="nearMissFlash"></div>
  <div id="nitroOverlay"></div>
</div>

<!-- Mobile Nitro -->
<div id="mobileNitroBtn" class="hidden">⚡<br>NITRO</div>

<!-- MAIN MENU -->
<div id="menuScreen" class="screen">
  <div class="menu-logo">MOTO RUSH</div>
  <div class="menu-sub">Endless Superbike Racing</div>
  <div class="hi-score-display">BEST: <span id="menuHiScore">0</span> pts &nbsp;|&nbsp; DIST: <span id="menuHiDist">0</span> m</div>
  <button class="btn" id="btnPlay">▶ START RACE</button>
  <button class="btn" id="btnBikes">🏍 SELECT BIKE</button>
</div>

<!-- BIKE SELECTION -->
<div id="bikeScreen" class="screen hidden">
  <div class="bike-select-title">SELECT YOUR MACHINE</div>
  <div class="bike-cards" id="bikeCards"></div>
  <button class="btn btn-gold" id="btnConfirmBike">CONFIRM SELECTION →</button>
  <button class="btn" style="margin-top:8px" id="btnBackMenu">← BACK</button>
</div>

<!-- PAUSE -->
<div id="pauseScreen" class="screen hidden">
  <div class="pause-title">⏸ PAUSED</div>
  <button class="btn" id="btnResume">▶ RESUME</button>
  <button class="btn btn-red" id="btnQuitPause">✕ QUIT RACE</button>
</div>

<!-- GAME OVER -->
<div id="gameOverScreen" class="screen hidden">
  <div class="go-title">CRASH!</div>
  <div class="go-stats">
    <div class="go-stat">
      <div class="go-stat-val" id="goScore">0</div>
      <div class="go-stat-label">SCORE</div>
    </div>
    <div class="go-stat">
      <div class="go-stat-val gold" id="goHiScore">0</div>
      <div class="go-stat-label">BEST SCORE</div>
    </div>
    <div class="go-stat">
      <div class="go-stat-val" id="goDist">0 m</div>
      <div class="go-stat-label">DISTANCE</div>
    </div>
    <div class="go-stat">
      <div class="go-stat-val" id="goNearMiss">0</div>
      <div class="go-stat-label">NEAR MISSES</div>
    </div>
  </div>
  <button class="btn btn-red" id="btnRestart">↺ RACE AGAIN</button>
  <button class="btn" style="margin-top:8px" id="btnGoMenu">⌂ MAIN MENU</button>
</div>

<div class="controls-tip" id="controlsTip">HOLD MOUSE to accelerate &nbsp;·&nbsp; MOVE to steer &nbsp;·&nbsp; SPACE = nitro</div>

<script>
// ════════════════════════════════════════════════════════════════════
//  MOTO RUSH — Complete Motorcycle Racing Game
//  Single-file HTML5 Canvas + Web Audio API
// ════════════════════════════════════════════════════════════════════

// ── CONSTANTS ─────────────────────────────────────────────────────
const ROAD_WIDTH   = 2000;
const SEGMENT_LEN  = 200;
const VISIBLE_SEGS = 160;
const LANES        = 4;
const CAM_HEIGHT   = 1000;
const CAM_DEPTH    = 0.84;
const FOV_FACTOR   = 0.84;

// ── CANVAS SETUP ──────────────────────────────────────────────────
const canvas  = document.getElementById('gameCanvas');
const ctx     = canvas.getContext('2d');
const exCanvas= document.getElementById('explosionCanvas');
const exCtx   = exCanvas.getContext('2d');
const speedoC = document.getElementById('speedoCanvas');
const speedoCtx = speedoC.getContext('2d');

let W, H;
function resize() {
  W = canvas.width  = exCanvas.width  = window.innerWidth;
  H = canvas.height = exCanvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); });
resize();

// ── BIKE DEFINITIONS ──────────────────────────────────────────────
const BIKES = [
  {
    id: 0, name: 'Suzuki Hayabusa',
    emoji: '🏍',
    color: '#1a6bcc',
    topSpeed: 95, acceleration: 78, handling: 70, nitroCapacity: 85,
    bodyColor: '#1a5bff', wheelColor: '#aaa', accentColor: '#ff6600',
    desc: 'Supreme top speed beast'
  },
  {
    id: 1, name: 'BMW S1000RR',
    emoji: '🏍',
    color: '#3355cc',
    topSpeed: 90, acceleration: 88, handling: 85, nitroCapacity: 78,
    bodyColor: '#1155bb', wheelColor: '#ccc', accentColor: '#cc0000',
    desc: 'Balanced performance king'
  },
  {
    id: 2, name: 'Kawasaki Ninja ZX-10R',
    emoji: '🏍',
    color: '#22aa33',
    topSpeed: 88, acceleration: 82, handling: 92, nitroCapacity: 80,
    bodyColor: '#11aa22', wheelColor: '#888', accentColor: '#00ffaa',
    desc: 'Nimble corner carver'
  }
];

// ── SAVED DATA ────────────────────────────────────────────────────
let savedData = {
  hiScore: 0, hiDist: 0, selectedBike: 0
};
function loadSave() {
  try {
    const d = JSON.parse(localStorage.getItem('motoRush'));
    if (d) savedData = { ...savedData, ...d };
  } catch(e) {}
}
function writeSave() {
  try { localStorage.setItem('motoRush', JSON.stringify(savedData)); } catch(e) {}
}
loadSave();

// ── SCREEN MANAGER ────────────────────────────────────────────────
const screens = {};
['menuScreen','bikeScreen','pauseScreen','gameOverScreen'].forEach(id => {
  screens[id] = document.getElementById(id);
});
const hud = document.getElementById('hud');
const mobileNitroBtn = document.getElementById('mobileNitroBtn');

function showScreen(name) {
  Object.keys(screens).forEach(k => screens[k].classList.add('hidden'));
  hud.classList.add('hidden');
  if (name && screens[name]) screens[name].classList.remove('hidden');
  if (name === null) { hud.classList.remove('hidden'); }
}

// ── AUDIO ENGINE ──────────────────────────────────────────────────
let audioCtx = null;
let engineOsc = null, engineGain = null;
let engineOsc2 = null;
let crashBuffer = null;
let nitroBuffer = null;
let nearMissBuffer = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  // Master compressor
  const comp = audioCtx.createDynamicsCompressor();
  comp.connect(audioCtx.destination);

  // Engine oscillator 1 (fundamental)
  engineOsc  = audioCtx.createOscillator();
  engineGain = audioCtx.createGain();
  const distortion = audioCtx.createWaveShaper();
  distortion.curve = makeDistortionCurve(80);
  distortion.oversample = '4x';
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 80;
  engineOsc.connect(distortion);
  distortion.connect(engineGain);
  engineGain.gain.value = 0;
  engineGain.connect(comp);
  engineOsc.start();

  // Engine oscillator 2 (harmonics)
  engineOsc2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  engineOsc2.type = 'square';
  engineOsc2.frequency.value = 160;
  engineOsc2.connect(g2);
  g2.gain.value = 0;
  g2.connect(comp);
  engineOsc2.start();
  engineGain._g2 = g2;
  engineGain._g2osc = engineOsc2;
}

function makeDistortionCurve(amount) {
  const n = 256, curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = (Math.PI + amount) * x / (Math.PI + amount * Math.abs(x));
  }
  return curve;
}

function updateEngineSound(speed, maxSpeed, bike) {
  if (!audioCtx || !engineOsc) return;
  const ratio = speed / maxSpeed;
  const baseFreq = 70 + ratio * 260 + (bike.acceleration * 0.6);
  engineOsc.frequency.setTargetAtTime(baseFreq, audioCtx.currentTime, 0.1);
  engineOsc2.frequency.setTargetAtTime(baseFreq * 2.1, audioCtx.currentTime, 0.1);
  const vol = ratio * 0.22 + 0.04;
  engineGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
  engineGain._g2.gain.setTargetAtTime(vol * 0.4, audioCtx.currentTime, 0.05);
}

function stopEngineSound() {
  if (!engineGain) return;
  engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
  engineGain._g2.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
}

function playTone(freq, duration, type='sine', vol=0.15) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + duration);
}

function playCrashSound() {
  if (!audioCtx) return;
  [80,60,40,30].forEach((f,i) => {
    setTimeout(() => playTone(f, 0.4, 'sawtooth', 0.3 - i*0.05), i*80);
  });
}

function playNitroSound() {
  if (!audioCtx) return;
  playTone(300, 0.15, 'square', 0.08);
  playTone(600, 0.1,  'square', 0.05);
}

function playNearMissSound() {
  if (!audioCtx) return;
  playTone(800, 0.08, 'square', 0.06);
  setTimeout(() => playTone(600, 0.08, 'square', 0.06), 80);
}

// ── ROAD SYSTEM ───────────────────────────────────────────────────
// Segment structure: { curve, hill }
let segments = [];
let segmentColors = { road:'#333', lane:'#fff', grass1:'#1a4a1a', grass2:'#225522', rumble1:'#cc2222', rumble2:'#fff' };

function createRoad() {
  segments = [];
  for (let i = 0; i < 5000; i++) {
    segments.push({
      curve: 0, hill: 0,
      color: i % 2 < 1 ? 0 : 1
    });
  }
  // Add curves and hills
  addRoadSection(0, 300, 0, 0);
  addRoadSection(300, 700, 0.4, 0);
  addRoadSection(700, 1100, -0.5, 0);
  addRoadSection(1100, 1500, 0.2, 0.4);
  addRoadSection(1500, 2000, -0.3, -0.3);
  addRoadSection(2000, 2500, 0.6, 0.5);
  addRoadSection(2500, 3000, -0.4, 0);
  addRoadSection(3000, 3500, 0.1, 0.2);
  addRoadSection(3500, 4000, -0.6, -0.4);
  addRoadSection(4000, 4500, 0.3, 0);
  addRoadSection(4500, 5000, 0, 0);
}

function addRoadSection(startIdx, endIdx, curve, hill) {
  for (let i = startIdx; i < Math.min(endIdx, segments.length); i++) {
    const t = (i - startIdx) / (endIdx - startIdx);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    segments[i].curve = ease * curve;
    segments[i].hill  = ease * hill;
  }
}

function getSegment(pos) {
  if (segments.length === 0) return segments[0];
  const idx = Math.floor(pos / SEGMENT_LEN) % segments.length;
  return segments[(idx + segments.length) % segments.length];
}

// ── PARTICLE SYSTEM ───────────────────────────────────────────────
let particles = [];

function spawnParticles(x, y, count, color, vx, vy, life) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: vx + (Math.random()-0.5)*4,
      vy: vy + (Math.random()-0.5)*4,
      life, maxLife: life,
      size: Math.random()*6+2,
      color
    });
  }
}

function updateParticles(dt) {
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x  += p.vx * dt * 60;
    p.y  += p.vy * dt * 60;
    p.vy += 0.15 * dt * 60;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

// ── EXPLOSION SYSTEM ──────────────────────────────────────────────
let explosion = null;

function triggerExplosion(x, y) {
  explosion = { x, y, t: 0, duration: 1.2, particles: [] };
  for (let i = 0; i < 60; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 8 + 2;
    explosion.particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: Math.random() * 12 + 4,
      color: ['#ff6600','#ffaa00','#ff3300','#ffff00','#ffffff'][Math.floor(Math.random()*5)],
      life: Math.random() * 0.8 + 0.4
    });
  }
}

function updateExplosion(dt) {
  if (!explosion) return;
  explosion.t += dt;
  explosion.particles.forEach(p => {
    p.x += p.vx * dt * 60;
    p.y += p.vy * dt * 60;
    p.vy += 0.3 * dt * 60;
    p.life -= dt;
    p.vx *= 0.95;
  });
  if (explosion.t > explosion.duration) explosion = null;
}

function drawExplosion() {
  if (!explosion) return;
  exCtx.clearRect(0, 0, W, H);
  explosion.particles.forEach(p => {
    if (p.life <= 0) return;
    exCtx.globalAlpha = Math.max(0, p.life);
    exCtx.fillStyle = p.color;
    exCtx.beginPath();
    exCtx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    exCtx.fill();
  });
  exCtx.globalAlpha = 1;
}

  input.steer = Math.max(-1, Math.min(1, diff * 1.8));
}, { passive: false });

// Keyboard
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (gameState === 'playing') input.nitro = true;
    if (gameState === 'gameover') restartGame();

  if (e.code === 'Escape' || e.code === 'KeyP') {

function createPlayer(bikeId) {
  const bike = BIKES[bikeId];
  return {
    bikeId,
    bike,
    x: 0,                // lateral position (-1=left, +1=right)
    speed: 0,            // current speed (0..1 ratio)
    maxSpeed: 250 + bike.topSpeed * 2.0,    // km/h equivalent
    accel:    0.0008 + bike.acceleration * 0.000018,
    decel:    0.0015,
    handling: 0.006 + bike.handling * 0.00005,

// ── TRAFFIC SYSTEM ────────────────────────────────────────────────
const VEHICLE_TYPES = [
  { type: 'car',   w: 180, h: 100, color: '#cc4422', color2: '#aa2200', speed: 0.15 },
  { type: 'car',   w: 160, h: 90,  color: '#2255cc', color2: '#113388', speed: 0.18 },
  { type: 'car',   w: 170, h: 95,  color: '#22cc44', color2: '#117722', speed: 0.20 },
  { type: 'car',   w: 165, h: 92,  color: '#cccc22', color2: '#888800', speed: 0.16 },
  { type: 'car',   w: 175, h: 88,  color: '#cc22cc', color2: '#881188', speed: 0.22 },
  { type: 'truck', w: 220, h: 140, color: '#884422', color2: '#552211', speed: 0.10 },
  { type: 'truck', w: 240, h: 150, color: '#446688', color2: '#223355', speed: 0.08 },
  { type: 'bus',   w: 210, h: 160, color: '#ffaa00', color2: '#cc7700', speed: 0.12 },
  { type: 'bus',   w: 200, h: 155, color: '#ff6600', color2: '#cc4400', speed: 0.11 },
];

const POOL_SIZE = 24;
let trafficPool = [];
function initTrafficPool() {
  trafficPool = [];
  for (let i = 0; i < POOL_SIZE; i++) {
    trafficPool.push({
      active: false,
      x: 0, z: 0,
      laneX: 0,
      speed: 0,
      typeIdx: 0,
      nearMissed: false,
      passedPlayer: false
    });
  }
}

function spawnVehicle() {
  const v = trafficPool.find(v => !v.active);
  if (!v) return;
  const lane = Math.floor(Math.random() * LANES);
  const laneX = (lane / (LANES-1)) * 2 - 1; // -1 to +1
  const typeIdx = Math.floor(Math.random() * VEHICLE_TYPES.length);
  const vt = VEHICLE_TYPES[typeIdx];
  v.active = true;
  v.x = laneX;
  v.laneX = laneX;
  v.z = camera.pos + SEGMENT_LEN * VISIBLE_SEGS * 0.98;
  v.speed = vt.speed + Math.random() * 0.05;
  v.typeIdx = typeIdx;
  v.nearMissed = false;
  v.passedPlayer = false;
  v.waver = 0;
  v.waverDir = (Math.random()-0.5)*0.01;
}

function updateTraffic(dt) {
  const playerZ = camera.pos;
  trafficPool.forEach(v => {
    if (!v.active) return;
    // Move vehicle toward player
    const relSpeed = player.speed * player.maxSpeed / 250 - v.speed;
    v.z -= relSpeed * dt * 280;
    v.waver = (v.waver || 0) + v.waverDir;
    if (Math.abs(v.waver) > 0.05) v.waverDir *= -1;
    v.x = v.laneX + v.waver;

    // Recycle if behind camera
    if (v.z < playerZ - SEGMENT_LEN * 3) {
      v.active = false;
    }
    // Near miss detection
    const vt = VEHICLE_TYPES[v.typeIdx];
    const dz = Math.abs(v.z - playerZ);
    const dx = Math.abs(v.x - player.x);
    const MISS_Z = 280, MISS_X = 0.25, HIT_X = 0.14, HIT_Z = 120;

    if (!v.nearMissed && dz < MISS_Z && dx < MISS_X + (vt.w/ROAD_WIDTH)*2) {
      if (dx > HIT_X + (vt.w/ROAD_WIDTH)) {
        // Near miss!
        v.nearMissed = true;
        onNearMiss();
      }
    }
    // Collision detection
    if (!player.crashState && player.invincible <= 0) {
      if (dz < HIT_Z && dx < HIT_X + (vt.w/ROAD_WIDTH)) {
        onCrash();
      }
    }
  });

  // Spawn new vehicles
  const activeCount = trafficPool.filter(v => v.active).length;
  const targetCount = Math.min(18, 6 + Math.floor(distance / 500));
  if (activeCount < targetCount && Math.random() < 0.03 + distance/50000) {
    spawnVehicle();
  }
}

// ── COLLISION / EVENTS ────────────────────────────────────────────
function onNearMiss() {
  nearMisses++;
  const bonus = Math.floor(200 + player.speed * 200);
  score += bonus;
  nearMissFlashTimer = 0.35;
  showBonus(`+${bonus} NEAR MISS!`, '#ffd700');
  playNearMissSound();
}

function onCrash() {
  player.crashState = true;
  player.speed = 0;
  stopEngineSound();
  playCrashSound();
  shakeMag = 18;
  triggerExplosion(W/2, H * 0.6);
  setTimeout(endGame, 1500);
}

function endGame() {
  gameState = 'gameover';
  const finalScore = Math.floor(score);
  const finalDist  = Math.floor(distance);
  isNewRecord = finalScore > savedData.hiScore;
  if (isNewRecord) savedData.hiScore = finalScore;
  if (finalDist > savedData.hiDist) savedData.hiDist = finalDist;
  writeSave();

  document.getElementById('goScore').textContent = finalScore.toLocaleString();
  document.getElementById('goHiScore').textContent = savedData.hiScore.toLocaleString();
  document.getElementById('goDist').textContent = finalDist + ' m';
  document.getElementById('goNearMiss').textContent = nearMisses;
  if (isNewRecord) {
    document.getElementById('goHiScore').style.animation = 'goFlicker .5s infinite';
    showBonus('🏆 NEW RECORD!', '#ffd700');
  }
  showScreen('gameOverScreen');
}

// ── CAMERA ────────────────────────────────────────────────────────
function createCamera() {
  return {
    pos: 0,
    height: CAM_HEIGHT,
    depth: CAM_DEPTH,
    x: 0,
    curve: 0
  };
}

// ── PHYSICS UPDATE ────────────────────────────────────────────────
function updatePhysics(dt) {
  const p = player;
  const bike = p.bike;

  // Acceleration
  if (input.accelerate && !p.crashState) {
    const boostFactor = (nitroActive && p.nitro > 0) ? 2.2 : 1;
    p.speed = Math.min(1, p.speed + p.accel * boostFactor * dt * 60);
  } else {
    p.speed = Math.max(0, p.speed - p.decel * dt * 60);
  }

  // Nitro
  if (nitroActive && input.nitro && p.nitro > 0 && !p.crashState && input.accelerate) {
    p.nitro = Math.max(0, p.nitro - 35 * dt);
    nitroOverlayAlpha = Math.min(0.5, nitroOverlayAlpha + 0.05);
    if (p.nitro <= 0) nitroActive = false;
  } else {
    if (input.nitro && p.nitro > 5 && !p.crashState && input.accelerate) {
      nitroActive = true;
      playNitroSound();
    }
    if (!input.nitro) nitroActive = false;
    // Recharge nitro slowly
    if (!nitroActive && p.nitro < p.nitroCapacity) {
      p.nitro = Math.min(p.nitroCapacity, p.nitro + 8 * dt);
    }
    nitroOverlayAlpha = Math.max(0, nitroOverlayAlpha - 0.04);
  }

  // Steer
  if (!p.crashState) {
    p.x = Math.max(-0.92, Math.min(0.92, p.x + input.steer * p.handling * p.speed * dt * 60));
    p.tilt = input.steer * p.speed * 22;
  }

  // Camera follows player
  const seg = getSegment(camera.pos);
  camera.pos += p.speed * p.maxSpeed * dt * 0.9;
  camera.x += -seg.curve * p.speed * dt * 200;
  camera.curve = seg.curve;

  // Score
  if (!p.crashState) {
    score += p.speed * dt * 180;
    distance += p.speed * p.maxSpeed * dt * 0.9;
    // Speed bonus
    if (p.speed > 0.85) score += dt * 40;
  }

  // Camera shake decay
  shakeMag = Math.max(0, shakeMag - dt * 30);
  shakeX = (Math.random()-0.5) * shakeMag * (p.speed > 0.7 ? p.speed : 0);
  shakeY = (Math.random()-0.5) * shakeMag * (p.speed > 0.7 ? p.speed : 0);
  // High speed shake
  if (p.speed > 0.75 && !p.crashState) {
    shakeX += (Math.random()-0.5) * p.speed * 1.5;
    shakeY += (Math.random()-0.5) * p.speed * 0.5;
  }

  // Near miss flash
  if (nearMissFlashTimer > 0) nearMissFlashTimer -= dt;

  // Invincibility frames after crash
  if (p.invincible > 0) p.invincible -= dt;

  // Engine sound
  updateEngineSound(p.speed, 1, bike);

  // Speed lines
  if (p.speed > 0.5) {
    for (let i = 0; i < p.speed * 3; i++) {
      speedLines.push({
        x: Math.random() * W,
        y: Math.random() * H,
        len: Math.random() * 80 + 20,
        life: 0.1 + Math.random() * 0.1,
        maxLife: 0.15,
        alpha: p.speed - 0.4
      });
    }
  }
  for (let i = speedLines.length-1; i >= 0; i--) {
    speedLines[i].life -= dt;
    if (speedLines[i].life <= 0) speedLines.splice(i,1);
  }
}

// ── PSEUDO-3D ROAD RENDERER ───────────────────────────────────────
function projectPoint(worldX, worldY, worldZ, cameraPos, cameraHeight, cameraDepth) {
  const cameraZ = cameraPos;
  const transZ   = worldZ - cameraZ;
  if (transZ <= 0) return { x: 0, y: 0, w: 0, scale: 0 };
  const scale = cameraDepth / transZ;
  const screenX = W/2 + scale * (worldX - camera.x) * W/2;
  const screenY = H/2 - scale * (worldY - cameraHeight) * H/2;
  const screenW  = scale * ROAD_WIDTH * W / 2;
  return { x: screenX, y: screenY, w: screenW, scale, z: transZ };
}

function drawRoad() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  skyGrad.addColorStop(0, '#000d1a');
  skyGrad.addColorStop(0.4, '#001a33');
  skyGrad.addColorStop(0.8, '#002244');
  skyGrad.addColorStop(1, '#001933');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.fillStyle = '#ffffff';
  for (let s = 0; s < 60; s++) {
    const sx = ((s * 137 + frameCount * 0.1) % W);
    const sy = ((s * 79) % (H * 0.45));
    const sAlpha = 0.3 + Math.sin(frameCount * 0.02 + s) * 0.2;
    ctx.globalAlpha = sAlpha;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;

  // Sun/moon glow on horizon
  const horizonY = H * 0.48;
  const sunGrad = ctx.createRadialGradient(W*0.5, horizonY, 0, W*0.5, horizonY, W*0.35);
  sunGrad.addColorStop(0, '#ff660022');
  sunGrad.addColorStop(0.5, '#ff220011');
  sunGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = sunGrad;
  ctx.fillRect(0, horizonY - W*0.35, W, W*0.7);

  // Background buildings (parallax)
  drawCityscape(horizonY);

  // Ground
  ctx.fillStyle = '#111a0d';
  ctx.fillRect(0, horizonY, W, H - horizonY);

  // Road segments
  const drawStart = Math.floor(camera.pos / SEGMENT_LEN);
  let camX = camera.x;
  let x = 0;
  let prevProjY = H;

  for (let s = 0; s < VISIBLE_SEGS; s++) {
    const segIdx = (drawStart + s) % segments.length;
    const seg = segments[segIdx];
    const segZ = (drawStart + s) * SEGMENT_LEN;

    const proj1 = projectPoint(0, 0, segZ,      camera.pos, CAM_HEIGHT, CAM_DEPTH);
    const proj2 = projectPoint(0, 0, segZ + SEGMENT_LEN, camera.pos, CAM_HEIGHT, CAM_DEPTH);

    if (proj1.scale <= 0 || proj1.y >= prevProjY) continue;

    const y1 = proj1.y;
    const y2 = Math.min(prevProjY, proj2.y < 0 ? 0 : proj2.y);
    if (y2 >= y1) continue;

    const w1 = proj1.w;
    const w2 = proj2.w;
    const cx1 = proj1.x;
    const cx2 = proj2.x;

    const isDark = seg.color === 0;

    // Grass
    ctx.fillStyle = isDark ? '#1a3a0e' : '#1f4512';
    ctx.beginPath();
    ctx.moveTo(0, y1); ctx.lineTo(W, y1);
    ctx.lineTo(W, y2); ctx.lineTo(0, y2);
    ctx.fill();

    // Rumble strip (outer)
    const rumbleW = w1 * 0.08;
    ctx.fillStyle = isDark ? '#cc1111' : '#eeeeee';
    // Left rumble
    ctx.beginPath();
    ctx.moveTo(cx1 - w1 - rumbleW, y1); ctx.lineTo(cx1 - w1, y1);
    ctx.lineTo(cx2 - w2, y2); ctx.lineTo(cx2 - w2 - rumbleW*(w2/w1), y2);
    ctx.fill();
    // Right rumble
    ctx.beginPath();
    ctx.moveTo(cx1 + w1, y1); ctx.lineTo(cx1 + w1 + rumbleW, y1);
    ctx.lineTo(cx2 + w2 + rumbleW*(w2/w1), y2); ctx.lineTo(cx2 + w2, y2);
    ctx.fill();

    // Road surface
    const roadColor = isDark ? '#2a2a2a' : '#333333';
    ctx.fillStyle = roadColor;
    ctx.beginPath();
    ctx.moveTo(cx1 - w1, y1); ctx.lineTo(cx1 + w1, y1);
    ctx.lineTo(cx2 + w2, y2); ctx.lineTo(cx2 - w2, y2);
    ctx.fill();

    // Lane markings
    ctx.fillStyle = isDark ? 'transparent' : 'rgba(255,255,255,0.6)';
    if (!isDark) {
      for (let ln = 1; ln < LANES; ln++) {
        const lx1 = cx1 + w1 * (ln/(LANES) * 2 - 1);
        const lx2 = cx2 + w2 * (ln/(LANES) * 2 - 1);
        const lw1 = w1 * 0.015;
        const lw2 = w2 * 0.015;
        ctx.beginPath();
        ctx.moveTo(lx1 - lw1, y1); ctx.lineTo(lx1 + lw1, y1);
        ctx.lineTo(lx2 + lw2, y2); ctx.lineTo(lx2 - lw2, y2);
        ctx.fill();
      }
    }

    prevProjY = y1;

    // Draw traffic in this segment
    trafficPool.forEach(v => {
      if (!v.active) return;
      const vSegZ = Math.floor(v.z / SEGMENT_LEN) * SEGMENT_LEN;
      if (vSegZ === (drawStart + s) * SEGMENT_LEN || Math.abs(v.z - segZ) < SEGMENT_LEN) {
        const vProj = projectPoint(v.x * ROAD_WIDTH * 0.5, 0, v.z, camera.pos, CAM_HEIGHT, CAM_DEPTH);
        if (vProj.scale > 0 && vProj.y < H && vProj.y > 0) {
          drawTrafficVehicle(v, vProj);
        }
      }
    });
  }

  // Road glow effect
  const roadGrad = ctx.createLinearGradient(0, H*0.48, 0, H);
  roadGrad.addColorStop(0, 'rgba(0,150,255,0.03)');
  roadGrad.addColorStop(0.5, 'rgba(0,80,180,0.02)');
  roadGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = roadGrad;
  ctx.fillRect(0, H*0.48, W, H*0.52);
}

function drawCityscape(horizonY) {
  const buildings = [
    {x:0.05,w:0.06,h:0.18,color:'#0a1a2a'},
    {x:0.12,w:0.04,h:0.25,color:'#0d1f30'},
    {x:0.18,w:0.07,h:0.15,color:'#0a1520'},
    {x:0.25,w:0.03,h:0.30,color:'#0e2235'},
    {x:0.30,w:0.06,h:0.20,color:'#091825'},
    {x:0.55,w:0.05,h:0.22,color:'#0a1a2a'},
    {x:0.62,w:0.04,h:0.28,color:'#0d1f30'},
    {x:0.68,w:0.06,h:0.16,color:'#0a1520'},
    {x:0.76,w:0.05,h:0.24,color:'#0e2235'},
    {x:0.84,w:0.07,h:0.18,color:'#091825'},
    {x:0.92,w:0.06,h:0.30,color:'#0d1f30'},
  ];
  const parallax = camera.x * 0.05;
  buildings.forEach(b => {
    const bx = (b.x + parallax) * W;
    const bw = b.w * W;
    const bh = b.h * H;
    ctx.fillStyle = b.color;
    ctx.fillRect(bx, horizonY - bh, bw, bh);
    // Windows
    ctx.fillStyle = 'rgba(255,220,100,0.3)';
    for (let wy = 0; wy < bh - 10; wy += 12) {
      for (let wx = 4; wx < bw - 4; wx += 10) {
        if (Math.random() < 0.6) {
          ctx.fillRect(bx + wx, horizonY - bh + wy + 4, 5, 6);
        }
      }
    }
  });
}

// ── DRAW TRAFFIC VEHICLES ────────────────────────────────────────
function drawTrafficVehicle(v, proj) {
  const vt = VEHICLE_TYPES[v.typeIdx];
  const scale = proj.scale * 1.8;
  const vw = vt.w * scale;
  const vh = vt.h * scale;
  const vx = proj.x - vw/2;
  const vy = proj.y - vh;

  ctx.save();
  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.ellipse(proj.x, proj.y, vw*0.5, vh*0.12, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  const grad = ctx.createLinearGradient(vx, vy, vx, vy + vh);
  grad.addColorStop(0, vt.color);
  grad.addColorStop(1, vt.color2);
  ctx.fillStyle = grad;
  ctx.fillRect(vx, vy, vw, vh * 0.7);

  // Roof / cab
  if (vt.type === 'car') {
    ctx.fillStyle = '#ffffff22';
    ctx.fillRect(vx + vw*0.15, vy, vw*0.7, vh*0.35);
  } else if (vt.type === 'truck') {
    ctx.fillStyle = vt.color;
    ctx.fillRect(vx, vy + vh*0.1, vw, vh*0.55);
    ctx.fillStyle = '#333';
    ctx.fillRect(vx, vy, vw*0.3, vh*0.6);
  } else { // bus
    ctx.fillStyle = vt.color;
    ctx.fillRect(vx, vy, vw, vh*0.65);
    // Bus windows
    ctx.fillStyle = '#ffffff33';
    for (let wi = 0; wi < 4; wi++) {
      ctx.fillRect(vx + vw*(0.1 + wi*0.22), vy + vh*0.08, vw*0.15, vh*0.3);
    }
  }

  // Wheels
  ctx.fillStyle = '#222';
  const wheelR = vw * 0.12;
  ctx.beginPath(); ctx.arc(vx + vw*0.2, vy + vh*0.68, wheelR, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(vx + vw*0.8, vy + vh*0.68, wheelR, 0, Math.PI*2); ctx.fill();
  // Tail lights
  ctx.fillStyle = '#ff2200';
  ctx.fillRect(vx, vy + vh*0.1, vw*0.06, vh*0.12);
  ctx.fillRect(vx + vw*0.94, vy + vh*0.1, vw*0.06, vh*0.12);

  ctx.restore();
}

// ── DRAW PLAYER BIKE ─────────────────────────────────────────────
function drawPlayerBike() {
  const p = player;
  const bike = p.bike;
  if (p.crashState && explosion) {
    // Don't draw bike while exploding
    return;
  }
  const cx = W / 2 + p.x * W * 0.22 + shakeX;
  const cy = H * 0.64 + shakeY;
  const sc = 1.0 + p.speed * 0.12; // slight zoom at speed
  const tilt = p.tilt;
  const speedRatio = p.speed;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(tilt * Math.PI / 180);
  ctx.scale(sc, sc);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, 28, 44, 10, 0, 0, Math.PI*2);
  ctx.fill();

  // Rear wheel
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(0, 20, 22, 22, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 3;
  ctx.stroke();
  // Wheel spokes
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1.5;
  for (let a = 0; a < 8; a++) {
    const angle = (a / 8) * Math.PI * 2 + frameCount * 0.3 * speedRatio;
    ctx.beginPath();
    ctx.moveTo(0, 20);
    ctx.lineTo(Math.cos(angle)*18, 20+Math.sin(angle)*18);
    ctx.stroke();
  }

  // Swing arm
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.moveTo(-8,-18); ctx.lineTo(8,-18); ctx.lineTo(4,22); ctx.lineTo(-4,22);
  ctx.closePath(); ctx.fill();

  // Exhaust / nitro flame
  if (nitroActive && p.nitro > 0) {
    const flameLen = 20 + Math.random() * 25;
    const flameGrad = ctx.createLinearGradient(0, 22, 0, 22 + flameLen);
    flameGrad.addColorStop(0, '#ffff00');
    flameGrad.addColorStop(0.4, '#ff6600');
    flameGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = flameGrad;
    ctx.beginPath();
    ctx.moveTo(-8, 22);
    ctx.quadraticCurveTo(-12, 22+flameLen*0.5, -4 + Math.random()*8, 22+flameLen);
    ctx.quadraticCurveTo(12, 22+flameLen*0.5, 8, 22);
    ctx.closePath();
    ctx.fill();
  }

  // Main body
  const bodyGrad = ctx.createLinearGradient(-24,-50, 24, 10);
  bodyGrad.addColorStop(0, bike.accentColor);
  bodyGrad.addColorStop(0.3, bike.bodyColor);
  bodyGrad.addColorStop(1, shadeColor(bike.bodyColor, -40));
  ctx.fillStyle = bodyGrad;
  // Fairing
  ctx.beginPath();
  ctx.moveTo(-18, -18);
  ctx.bezierCurveTo(-22,-40, -14,-58, 0,-62);
  ctx.bezierCurveTo(14,-58, 22,-40, 18,-18);
  ctx.bezierCurveTo(20,-5, 16,8, 10,14);
  ctx.lineTo(-10,14);
  ctx.bezierCurveTo(-16,8, -20,-5, -18,-18);
  ctx.closePath();
  ctx.fill();

  // Accent stripe
  ctx.fillStyle = bike.accentColor + 'aa';
  ctx.fillRect(-4, -60, 8, 40);

  // Windscreen
  ctx.fillStyle = 'rgba(150,220,255,0.25)';
  ctx.beginPath();
  ctx.moveTo(-10,-30); ctx.bezierCurveTo(-12,-48, 12,-48, 10,-30);
  ctx.closePath(); ctx.fill();

  // Headlight
  ctx.fillStyle = '#ffffaa';
  ctx.shadowBlur = 20; ctx.shadowColor = '#ffff88';
  ctx.fillRect(-8,-58, 16, 8);
  ctx.shadowBlur = 0;

  // Rider (simplified)
  // Torso
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.moveTo(-10,-18); ctx.lineTo(10,-18);
  ctx.lineTo(8,-48); ctx.lineTo(-8,-48);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = bike.accentColor + '88';
  ctx.fillRect(-4,-46, 8,24);

  // Helmet
  ctx.fillStyle = bike.bodyColor;
  ctx.beginPath();
  ctx.arc(0,-52, 12, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(150,220,255,0.35)';
  ctx.beginPath();
  ctx.arc(3,-51, 7, -0.5, 0.8);
  ctx.closePath(); ctx.fill();

  // Front wheel
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(0, -70, 18, 18, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 3; ctx.stroke();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 1.5;
  for (let a = 0; a < 6; a++) {
    const angle = (a/6)*Math.PI*2 + frameCount*0.4*speedRatio;
    ctx.beginPath();
    ctx.moveTo(0,-70);
    ctx.lineTo(Math.cos(angle)*15, -70+Math.sin(angle)*15);
    ctx.stroke();
  }

  // Fork
  ctx.strokeStyle = '#888'; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.moveTo(-6,-20); ctx.lineTo(-4,-70); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,-20); ctx.lineTo(4,-70); ctx.stroke();

  ctx.restore();
}

function shadeColor(hex, pct) {
  const n = parseInt(hex.replace('#',''),16);
  const r = Math.max(0,Math.min(255, (n>>16)+pct));
  const g = Math.max(0,Math.min(255, ((n>>8)&0xff)+pct));
  const b = Math.max(0,Math.min(255, (n&0xff)+pct));
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ── DRAW SPEED LINES ─────────────────────────────────────────────
function drawSpeedLines() {
  speedLines.forEach(sl => {
    const alpha = (sl.life / sl.maxLife) * sl.alpha * 0.6;
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(sl.x, sl.y);
    ctx.lineTo(sl.x + sl.len * (sl.x > W/2 ? 1 : -1) * 0.15, sl.y + (Math.random()-0.5)*2);
    ctx.stroke();
  });
  ctx.globalAlpha = 1;
}

// ── SPEEDOMETER ───────────────────────────────────────────────────
function drawSpeedometer() {
  const c = speedoCtx;
  const cx = 45, cy = 45, r = 38;
  c.clearRect(0, 0, 90, 90);

  // Background
  c.beginPath();
  c.arc(cx, cy, r, 0, Math.PI*2);
  c.fillStyle = 'rgba(0,10,20,0.85)';
  c.fill();
  c.strokeStyle = '#00f0ff44';
  c.lineWidth = 2; c.stroke();

  const speed = player ? player.speed * player.maxSpeed : 0;
  const maxSpd = player ? player.maxSpeed : 300;
  const ratio = speed / maxSpd;

  // Arc track
  const startA = Math.PI * 0.75;
  const endA   = Math.PI * 2.25;
  c.beginPath();
  c.arc(cx, cy, r-5, startA, endA);
  c.strokeStyle = '#ffffff11';
  c.lineWidth = 5; c.stroke();

  // Speed arc
  const arcColor = ratio > 0.85 ? '#ff3c00' : ratio > 0.65 ? '#ffaa00' : '#00f0ff';
  c.beginPath();
  c.arc(cx, cy, r-5, startA, startA + (endA-startA)*ratio);
  c.strokeStyle = arcColor;
  c.lineWidth = 5;
  c.shadowBlur = 10; c.shadowColor = arcColor;
  c.stroke(); c.shadowBlur = 0;

  // Needle
  const needleAngle = startA + (endA-startA)*ratio;
  c.beginPath();
  c.moveTo(cx, cy);
  c.lineTo(cx + Math.cos(needleAngle)*(r-10), cy + Math.sin(needleAngle)*(r-10));
  c.strokeStyle = '#ff4400';
  c.lineWidth = 2; c.stroke();

  // Center dot
  c.beginPath(); c.arc(cx, cy, 4, 0, Math.PI*2);
  c.fillStyle = '#ff4400'; c.fill();

  document.getElementById('speedoVal').textContent = Math.floor(speed);
}

// ── HUD UPDATE ────────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('hudScore').textContent = Math.floor(score).toLocaleString();
  document.getElementById('hudDist').textContent = Math.floor(distance) + ' m';

  const nitroRatio = player.nitro / player.nitroCapacity;
  document.getElementById('nitroBar').style.width = (nitroRatio * 100) + '%';

  const nmFlash = document.getElementById('nearMissFlash');
  nmFlash.style.opacity = nearMissFlashTimer > 0 ? '0.7' : '0';

  const nitroOvl = document.getElementById('nitroOverlay');
  nitroOvl.style.opacity = nitroOverlayAlpha;

  drawSpeedometer();
}

// ── MAIN GAME LOOP ────────────────────────────────────────────────
function gameLoop(timestamp) {
  if (gameState !== 'playing') return;
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  frameCount++;

  // Update
  updatePhysics(dt);
  updateTraffic(dt);
  updateParticles(dt);
  updateExplosion(dt);

  // Render
  ctx.save();
  ctx.translate(shakeX, shakeY);
  drawRoad();
  ctx.restore();

  drawSpeedLines();
  drawPlayerBike();
  drawParticles();
  drawExplosion();
  updateHUD();

  requestAnimationFrame(gameLoop);
}

// ── GAME MANAGEMENT ───────────────────────────────────────────────
function startGame() {
  createRoad();
  initTrafficPool();
  player   = createPlayer(savedData.selectedBike);
  camera   = createCamera();
  score    = 0;
  distance = 0;
  nearMisses = 0;
  frameCount = 0;
  particles  = [];
  speedLines = [];
  shakeX = shakeY = shakeMag = 0;
  nitroActive = false;
  nitroOverlayAlpha = 0;
  exCtx.clearRect(0,0,W,H);

  // Spawn initial traffic
  for (let i = 0; i < 8; i++) spawnVehicle();

  showScreen(null); // show HUD
  if (input.isMobile) {
    mobileNitroBtn.classList.remove('hidden');
    document.getElementById('controlsTip').textContent = 'HOLD SCREEN to go · TILT to steer · TAP ⚡ for nitro';
  } else {
    document.getElementById('controlsTip').textContent = 'HOLD MOUSE or W to go · MOVE to steer · SPACE = nitro';
  }

  gameState = 'playing';
  lastTime  = performance.now();
  requestAnimationFrame(gameLoop);
}

function pauseGame() {
  gameState = 'paused';
  stopEngineSound();
  showScreen('pauseScreen');
}

function resumeGame() {
  gameState = 'playing';
  showScreen(null);
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

function restartGame() {
  mobileNitroBtn.classList.add('hidden');
  startGame();
}

// ── BIKE SELECTION UI ─────────────────────────────────────────────
function buildBikeCards() {
  const container = document.getElementById('bikeCards');
  container.innerHTML = '';
  BIKES.forEach((bike, i) => {
    const card = document.createElement('div');
    card.className = 'bike-card' + (i === savedData.selectedBike ? ' selected' : '');
    card.innerHTML = `
      <div class="bike-card-name">${bike.name}</div>
      <span class="bike-emoji">🏍</span>
      <div style="font-size:11px;color:#88aacc;margin-bottom:10px;letter-spacing:.06em">${bike.desc}</div>
      <div class="stat-bar-row">
        <div class="stat-label">TOP SPEED</div>
        <div class="stat-bar"><div class="stat-fill" style="width:${bike.topSpeed}%"></div></div>
      </div>
      <div class="stat-bar-row">
        <div class="stat-label">ACCELERATION</div>
        <div class="stat-bar"><div class="stat-fill" style="width:${bike.acceleration}%"></div></div>
      </div>
      <div class="stat-bar-row">
        <div class="stat-label">HANDLING</div>
        <div class="stat-bar"><div class="stat-fill" style="width:${bike.handling}%"></div></div>
      </div>
      <div class="stat-bar-row">
        <div class="stat-label">NITRO</div>
        <div class="stat-bar"><div class="stat-fill" style="width:${bike.nitroCapacity}%;background:linear-gradient(90deg,#ff6600,#ffaa00)"></div></div>
      </div>
    `;
    card.addEventListener('click', () => {
      savedData.selectedBike = i;
      writeSave();
      document.querySelectorAll('.bike-card').forEach((c,j) => {
        c.classList.toggle('selected', j === i);
      });
    });
    container.appendChild(card);
  });
}

// ── MENU LOGIC ────────────────────────────────────────────────────
function updateMenuScores() {
  document.getElementById('menuHiScore').textContent = savedData.hiScore.toLocaleString();
  document.getElementById('menuHiDist').textContent = savedData.hiDist.toLocaleString();
}

// Menu background animation
let menuAnimFrame = 0;
function menuAnimation(ts) {
  if (gameState !== 'menu' && gameState !== 'bike') return;
  menuAnimFrame++;

  // Animated road on menu
  ctx.fillStyle = '#000d1a';
  ctx.fillRect(0,0,W,H);

  // Stars
  for (let s = 0; s < 80; s++) {
    const sx = (s*179 + menuAnimFrame*0.08) % W;
    const sy = (s*97) % (H*0.5);
    ctx.fillStyle = `rgba(255,255,255,${0.2 + Math.sin(menuAnimFrame*0.02+s)*0.15})`;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }

  // Horizon glow
  const hg = ctx.createLinearGradient(0,H*0.5,0,H*0.7);
  hg.addColorStop(0,'rgba(0,150,255,0.08)');
  hg.addColorStop(1,'transparent');
  ctx.fillStyle = hg;
  ctx.fillRect(0,H*0.5,W,H*0.2);

  // Scrolling road lines
  const linesOff = (menuAnimFrame * 8) % 60;
  ctx.strokeStyle = 'rgba(0,240,255,0.15)';
  ctx.lineWidth = 2;
  for (let y = H*0.55; y < H; y += 60) {
    const pct = (y - H*0.55) / (H*0.45);
    const xOff = (W/2) * pct * 0.6;
    ctx.beginPath();
    ctx.moveTo(W/2 - xOff, y + linesOff*pct);
    ctx.lineTo(W/2 + xOff, y + linesOff*pct);
    ctx.stroke();
  }

  requestAnimationFrame(menuAnimation);
}

// ── BUTTON WIRING ─────────────────────────────────────────────────
document.getElementById('btnPlay').addEventListener('click', () => {
  initAudio();
  gameState = 'playing';
  startGame();
});
document.getElementById('btnBikes').addEventListener('click', () => {
  buildBikeCards();

  gameState = 'bike';
});
document.getElementById('btnConfirmBike').addEventListener('click', () => {
  writeSave();
  showScreen('menuScreen');
  updateMenuScores();
  gameState = 'menu';
});
document.getElementById('btnBackMenu').addEventListener('click', () => {
  showScreen('menuScreen');
  updateMenuScores();
  gameState = 'menu';
});
document.getElementById('btnResume').addEventListener('click', resumeGame);

  mobileNitroBtn.classList.add('hidden');

  updateMenuScores();

});

});
document.getElementById('btnGoMenu').addEventListener('click', () => {
  gameState = 'menu';
  mobileNitroBtn.classList.add('hidden');

  updateMenuScores();

});

// ── INIT ──────────────────────────────────────────────────────────
showScreen('menuScreen');
updateMenuScores();
gameState = 'menu';
requestAnimationFrame(menuAnimation);
</script>
